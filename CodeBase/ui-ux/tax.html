<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Optimization Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            max-width: 1000px;
           
            height: 800px;
            
            justify-items: center;
        }
        label {
            font-weight: bold;
        }
        input, select, button {
            display: block;
            margin-left: 1rem;
           
            width: 80%;
            height: 50px;
            margin: 8px 0;
            padding: 8px;
            border-radius: 10px;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            height: 80px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .optional-field {
            display: none;
            margin-top: 8px;
        }
        .tooltip {
            position: relative;
            cursor: help;
            border-bottom: 1px dotted black;
        }
        .tooltip:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 0;
            top: 100%;
            background-color: #333;
            color: white;
            padding: 5px;
            border-radius: 5px;
            font-size: 0.9em;
            white-space: nowrap;
            z-index: 10;
        }
    </style>

</head>
<body>

     <div class="img">
        <img src="c:\Users\KADAK SINGH\Downloads\undraw_undraw_favoritepost_r6a0_-2-_oohm.svg" alt="">
     </div>
    <h1>Tax Optimization Form</h1>
    <form id="taxForm" onsubmit="handleFormSubmit(event)" action="submit" method="post">
        <label for="income">Annual Income (₹):</label>
        <input type="number" id="income" name="income" required>

        <label for="basic_salary">Basic Salary (₹):</label>
        <input type="number" id="basic_salary" name="basic_salary" required>

        <label for="hra_rent_paid">Rent Paid (₹):</label>
        <input type="number" id="hra_rent_paid" name="hra_rent_paid">

        <label for="health_insurance_premium">Health Insurance Premium (₹):</label>
        <input type="number" id="health_insurance_premium" name="health_insurance_premium">

        <label for="education_loan_interest">Education Loan Interest (₹):</label>
        <input type="number" id="education_loan_interest" name="education_loan_interest">

        <label for="investments_80C">Investment Amount (₹):</label>
        <input type="number" id="investments_80C" name="investments_80C">

        <label for="home_loan_interest">Home Loan Interest (₹):</label>
        <input type="number" id="home_loan_interest" name="home_loan_interest">

        <button type="submit">Optimize Tax</button>
    </form>

    <div id="results"></div>
</body>
</html>
