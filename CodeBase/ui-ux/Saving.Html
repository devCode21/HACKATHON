<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saving Goal Form</title>
    <link rel="stylesheet" href="Saving.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Include Chart.js -->
</head>
<body>
    <h2>Saving Goal</h2>
    <div class="outerConatiner">
        <div style="width: 40%; margin: 10px auto;" class="img">
            <canvas id="expensesChart"></canvas>
        </div>
        
        <form>
            <label for="goal-name">Goal Name:</label>
            <input type="text" id="goal-name" name="goal-name" required>
    
            <label for="goal-amount">Goal Amount:</label>
            <input type="number" id="goal-amount" name="goal-amount" required>
    
            <label for="goal-category">Goal Category:</label>
            <select id="goal-category" name="goal-category">
                <option value="emergency-fund">Emergency Fund</option>
                <option value="vacation">Vacation</option>
                <option value="home-down-payment">Home Down Payment</option>
                <option value="car">Car</option>
                <option value="education">Education</option>
                <option value="other">Other</option>
            </select>
    
            <h3>Goal Details</h3>
    
            <label for="income">Monthly Income:</label>
            <input type="number" id="income" name="income" required>
    
            <label for="savings-rate">Savings Rate (%):</label>
            <input type="number" id="savings-rate" name="savings-rate" required>
    
            <label for="time-period">Time Period (months):</label>
            <input type="number" id="time-period" name="time-period" required>
    
            <label for="debts">Current Debts:</label>
            <input type="number" id="debts" name="debts" required>
    
            <button type="submit">Save Goal</button>
        </form>
    </div>

    <!-- Chart Container -->
   

    <script src="Saving.js"></script>
</body>
</html>
